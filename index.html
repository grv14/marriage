<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Wishes</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:
radial-gradient(circle at top,#1f1f1f,#050505);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* Floating Particles */
.particle{
position:absolute;
width:4px;
height:4px;
background:#d4af37;
border-radius:50%;
opacity:.5;
animation:float 10s linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}

.container{
width:100%;
max-width:450px;
text-align:center;
}

/* Card */

.card{
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
border:1px solid rgba(212,175,55,.2);
padding:30px;
border-radius:25px;
box-shadow:0 0 40px rgba(212,175,55,.1);
}

h1{
font-family:'Great Vibes',cursive;
font-size:clamp(3rem,8vw,5rem);
color:#d4af37;
font-weight:normal;
margin-bottom:15px;
}

.sub{
color:#ddd;
font-size:15px;
line-height:1.7;
margin-bottom:30px;
}

button{
padding:14px 35px;
font-size:16px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#d4af37,#f5d77a);
color:#111;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

/* Hidden Pages */

.page{
display:none;
}

.active{
display:block;
animation:fade .8s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Letter */

.letter{
background:#fffaf0;
padding:25px;
border-radius:20px;
color:#333;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.message{
font-size:18px;
line-height:1.8;
min-height:220px;
}

.final{
font-family:'Great Vibes',cursive;
font-size:clamp(2.5rem,8vw,4rem);
color:#d4af37;
line-height:1.5;
}

.heart{
font-size:50px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.15);
}
}

</style>
</head>
<body>

<!-- PARTICLES -->
<script>
for(let i=0;i<40;i++){
let p=document.createElement('div');
p.className='particle';
p.style.left=Math.random()*100+'vw';
p.style.animationDuration=(Math.random()*8+5)+'s';
p.style.animationDelay=Math.random()*5+'s';
document.body.appendChild(p);
}
</script>

<div class="container">

<!-- PAGE 1 -->

<div id="page1" class="page active">

<div class="card">

<h1>Congratulations</h1>

<p class="sub">
A special message for the newly married couple ✨
</p>

<button onclick="openLetter()">
Open Letter 💌
</button>

</div>

</div>

<!-- PAGE 2 -->

<div id="page2" class="page">

<div class="letter">

<div id="typing" class="message"></div>

<button onclick="showFinal()">
Continue ❤️
</button>

</div>

</div>

<!-- PAGE 3 -->

<div id="page3" class="page">

<div class="card">

<div class="heart">❤️</div>

<div class="final">
Happy Married Life
<br>
Yashwant ❤️ Preeti
</div>

<p class="sub" style="margin-top:20px;">
May your love story continue forever.
</p>

</div>

</div>

</div>

<script>

const msg =
"Two beautiful hearts, one unforgettable journey. May every sunrise bring new happiness, every moment create beautiful memories, and every year strengthen the bond you share. Wishing you a lifetime filled with love, laughter, trust and endless togetherness. Congratulations on your wedding and best wishes for a wonderful future together. ❤️";

function openLetter(){

document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");

let i=0;

function type(){

if(i<msg.length){

document.getElementById("typing").innerHTML += msg.charAt(i);

i++;

setTimeout(type,35);

}

}

type();

}

function showFinal(){

document.getElementById("page2").classList.remove("active");
document.getElementById("page3").classList.add("active");

}

</script>

</body>
</html>
